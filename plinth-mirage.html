<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLINTH — MIRAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#e9e4da;--ink:#17130e;--mut:#7a6f60;--acc:#b5642a;--line:#cdc4b4}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:'IBM Plex Mono',ui-monospace,monospace}
  .card{position:absolute;inset:0;display:grid;grid-template-columns:1.05fr 1fr;
    align-items:center;gap:4%;padding:5% 6%}
  .art{display:flex;align-items:center;justify-content:center;height:100%}
  .art img{width:100%;max-height:86%;object-fit:contain;
    filter:drop-shadow(0 34px 44px rgba(20,18,16,.14))}
  .kick{font-size:.82rem;letter-spacing:.24em;text-transform:uppercase;color:var(--mut)}
  h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;
    font-size:clamp(1.7rem,4.4vw,3.3rem);line-height:1.02;margin:.55em 0 .55em;letter-spacing:.005em}
  .desc{font-size:.9rem;line-height:1.6;color:#3a332a;max-width:42ch}
  .spec{margin-top:1.3em;font-size:.78rem;letter-spacing:.08em;color:var(--mut);
    padding-top:1.1em;border-top:1px solid var(--line)}
  .claim{margin-top:.5em;font-size:.78rem;letter-spacing:.08em;color:var(--acc)}
  @media(max-width:640px){.card{grid-template-columns:1fr;gap:2%;padding:7%}.art img{max-height:50%}}
</style>
</head>
<body>
  <div class="card">
    <div class="art"><img src="plinth-mirage.svg" alt="MIRAGE — technical drawing"></div>
    <div class="copy">
      <div class="kick">MIRAGE — All-in-one</div>
      <h1>The whole night,<br>cast as one object.</h1>
      <p class="desc">Two sculpted towers, four cast woofers, a glossy deck bridging the base.
        Your 4-channel rider drops in and disappears — nothing to assemble, you plug in and play.</p>
      <div class="spec">Brushed steel · Edition of 5 · $290,000</div>
      <div class="claim">No. 3 of 5 still unclaimed</div>
    </div>
  </div>
</body>
</html>
