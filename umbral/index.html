<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRAL — un reino hundido bajo la niebla</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #04060a;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    image-rendering: auto;
    box-shadow: 0 0 120px rgba(20, 30, 50, 0.55);
  }
</style>
</head>
<body>
<canvas id="cv" width="960" height="540"></canvas>
<script>
  // visor de errores: si algo truena, se ve en pantalla en vez de canvas negro
  window.addEventListener('error', function (e) {
    var d = document.getElementById('errbox');
    if (!d) {
      d = document.createElement('div');
      d.id = 'errbox';
      d.style.cssText = 'position:fixed;top:8px;left:8px;right:8px;z-index:99;background:rgba(120,20,20,.92);color:#ffe9c4;font:12px Menlo,monospace;padding:10px 14px;border-radius:6px;white-space:pre-wrap;';
      document.body.appendChild(d);
    }
    d.textContent = 'ERROR: ' + e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '');
  });
</script>
<script src="js/audio.js"></script>
<script src="js/data.js"></script>
<script src="js/entities.js"></script>
<script src="js/game.js"></script>
</body>
</html>
